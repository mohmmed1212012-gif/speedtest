<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>قياس سرعة الإنترنت المجاني</title>
    <style>
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #1a1a2e;
        color: #ffffff;
        text-align: center;
        padding: 50px 20px;
        margin: 0;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
        background: #162447;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      }
      h1 { color: #e43f5a; margin-bottom: 10px; }
      .tagline { color: #a2a8d3; margin-bottom: 30px; }
      .btn-start {
        background-color: #e43f5a;
        color: white;
        border: none;
        padding: 15px 40px;
        font-size: 18px;
        font-weight: bold;
        border-radius: 25px;
        cursor: pointer;
        transition: 0.3s;
      }
      .btn-start:hover { background-color: #ff4a68; transform: scale(1.05); }
      .results {
        display: flex;
        justify-content: space-around;
        margin-top: 40px;
        flex-wrap: wrap;
      }
      .result-box {
        background: #1f4068;
        padding: 20px;
        border-radius: 10px;
        min-width: 120px;
        margin: 10px;
      }
      .result-box h3 { margin: 0 0 10px 0; color: #a2a8d3; font-size: 14px; }
      .result-box p { margin: 0; font-size: 24px; font-weight: bold; color: #00fff0; }
      /* مكان مخصص لإعلانات Adsterra لاحقاً */
      .ads-container { margin-top: 40px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 5px; min-height: 90px; }
    </style>
  </head>
  <body>

    <div class="container">
      <h1>موقع قياس سرعة الإنترنت</h1>
      <p class="tagline">افحص سرعة اتصالك بالشبكة فوراً وبالمجان</p>

      <button class="btn-start" id="startBtn" onclick="startTest()">إبدأ الفحص</button>

      <div class="results">
        <div class="result-box">
          <h3>التحميل (Download)</h3>
          <p id="download">0.00 <span style="font-size:14px;">Mbps</span></p>
        </div>
        <div class="result-box">
          <h3>الرفع (Upload)</h3>
          <p id="upload">0.00 <span style="font-size:14px;">Mbps</span></p>
        </div>
        <div class="result-box">
          <h3>الاستجابة (Ping)</h3>
          <p id="ping">0 <span style="font-size:14px;">ms</span></p>
        </div>
      </div>

      <!-- الإعلان سيظهر هنا أسفل العداد تماماً بعد اشتراكك في Adsterra -->
      <div class="ads-container" id="adspace">
        <span style="color:#666; font-size:12px;">مساحة إعلانية</span>
      </div>
    </div>

    <!-- جافا سكريبت وهمي محاكي للعمل بشكل مستقل وصحيح 100% على الاستضافة المجانية -->
    <script>
      function startTest() {
        const btn = document.getElementById('startBtn');
        btn.disabled = true;
        btn.innerText = 'جاري الفحص...';
        
        let dl = 0;
        let ul = 0;
        let ping = Math.floor(Math.random() * 30) + 15;
        
        document.getElementById('ping').innerHTML = ping + ' <span style="font-size:14px;">ms</span>';
        
        // محاكاة التحميل
        let dlInterval = setInterval(() => {
          dl += (Math.random() * 8);
          if(dl > 45) { // أقصى سرعة وهمية للفحص التجريبي
            clearInterval(dlInterval);
            document.getElementById('download').innerHTML = (45.2).toFixed(2) + ' <span style="font-size:14px;">Mbps</span>';
            
            // محاكاة الرفع بعد التحميل
            let ulInterval = setInterval(() => {
              ul += (Math.random() * 3);
              if(ul > 12) {
                clearInterval(ulInterval);
                document.getElementById('upload').innerHTML = (12.4).toFixed(2) + ' <span style="font-size:14px;">Mbps</span>';
                btn.disabled = false;
                btn.innerText = 'إعادة الفحص';
              } else {
                document.getElementById('upload').innerHTML = ul.toFixed(2) + ' <span style="font-size:14px;">Mbps</span>';
              }
            }, 100);
          } else {
            document.getElementById('download').innerHTML = dl.toFixed(2) + ' <span style="font-size:14px;">Mbps</span>';
          }
        }, 100);
      }
    </script>
  </body>
</html>
